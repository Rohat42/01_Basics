<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: red;


        }

        .container {
           display: grid;
            grid-template-columns: 100px 100px  150px;
           column-gap: 1px;
            row-gap:1px;
             background-color: green;
             height: 400px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class=" box item1">eins</div>
        <div class="box item2">zwei</div>
        <div class="box item3">drei</div>
        <div class="box item4">vier</div>
        <div class="box item5">fünf</div>
    </div>
</body>

</html>
