<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Achte darauf, dass der Dateiname exakt mit deiner CSS-Datei übereinstimmt -->
    <link rel="stylesheet" href="style.css"> 
    <style>
        div {
            background-color: aquamarine;
        }
        #header {
            font-size: 2rem;
            font-weight: bold;
        }
        .subtitle {
            color: blue;
        }
        #text p {
            background-color: blueviolet;
            color: white; /* Für bessere Lesbarkeit */
        }
    </style>
</head>

<body>
    <div id="header">Heading</div>
    <div class="subtitle" id="subtitle">Subtitle</div>
    
    <div id="text">
        <p>eins</p>
        <p>zwei</p>
    </div> <!-- Schließendes div für #text -->
</body> <!-- Schließendes body-Tag -->
</html>
